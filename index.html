<style>
    body { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        background-color: #f4f7f6; 
        padding: 20px; 
    }
    
    .container { 
        max-width: 1350px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        overflow-x: auto;           /* फ्रेम बाहेर जाण्यापासून रोखण्यासाठी */
        min-width: 100%;
    }
    
    h2 { 
        text-align: center; 
        color: #1a73e8; 
        border-bottom: 2px solid #1a73e8; 
        padding-bottom: 10px; 
        margin-bottom: 20px; 
    }
    
    .tab-bar { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 20px; 
        border-bottom: 2px solid #ddd; 
        padding-bottom: 10px; 
        flex-wrap: wrap;
    }
    
    .tab-btn { 
        padding: 12px 25px; 
        border: none; 
        background-color: #e0e0e0; 
        font-size: 15px; 
        font-weight: bold; 
        cursor: pointer; 
        border-radius: 5px; 
        transition: 0.3s; 
        flex: 1 1 auto;
        min-width: 180px;
    }
    
    .tab-btn.active { 
        background-color: #1a73e8; 
        color: white; 
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .setup-box, .entry-box, .essential-box, .encash-box, .info-box { 
        background: #e3f2fd; 
        padding: 15px; 
        border-radius: 8px; 
        border: 1px solid #bbdefb; 
        margin-bottom: 20px; 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
        gap: 12px;
    }
    
    .entry-box { background: #fffde7; border: 1px solid #fbc02d; }
    .essential-box { background: #e0f2f1; border: 1px solid #4db6ac; }
    .encash-box { background: #e8f5e9; border: 1px solid #a5d6a7; }
    .info-box { background: #fce4ec; border: 1px solid #f8bbd0; }
    
    label { 
        font-weight: bold; 
        font-size: 13px; 
        display: block; 
        margin-bottom: 5px; 
        color: #333; 
    }
    
    input, select { 
        width: 100%; 
        padding: 8px; 
        border: 1px solid #ccc; 
        border-radius: 4px; 
        box-sizing: border-box; 
        font-size: 14px; 
        background-color: #fff; 
    }
    
    input:disabled, input[readonly] { 
        background-color: #eee; 
        color: #555; 
    }
    
    .grid-3 { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
        gap: 15px; 
        align-items: end; 
    }
    
    /* ==================== बटणांचा मुख्य बदल ==================== */
    .btn-group { 
        display: flex; 
        flex-wrap: wrap;           /* बटणे खाली येतील जर जागा नसेल */
        gap: 8px; 
        margin-top: 15px;
        width: 100%;
        justify-content: flex-start;
        align-items: center;
    }
    
    .btn-add, .btn-pagebreak, .btn-excel, .btn-delete, .btn-clear {
        padding: 11px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        flex: 1 1 170px;           /* responsive */
        min-width: 140px;
        white-space: nowrap;
        text-align: center;
    }
    
    .btn-add { background-color: #1a73e8; color: white; }
    .btn-pagebreak { background-color: #0288d1; color: white; }
    .btn-excel { background-color: #2e7d32; color: white; }
    .btn-delete { background-color: #d32f2f; color: white; }
    .btn-clear { background-color: #555555; color: white; }
    
    .btn-calc-bonus { 
        background-color: #00796b; 
        color: white; 
        padding: 10px 15px; 
        border: none; 
        border-radius: 4px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 14px; 
        width: 100%; 
    }
    
    .btn-save-bonus { 
        background-color: #e65100; 
        color: white; 
        padding: 10px 15px; 
        border: none; 
        border-radius: 4px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 14px; 
        width: 100%; 
        display: none; 
    }
    
    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 20px; 
        font-size: 11px; 
        min-width: 1100px;           /* स्क्रोलसाठी */
        overflow-x: auto;
        display: block;
    }
    
    th, td { 
        border: 1px solid #ddd; 
        padding: 6px; 
        text-align: center; 
    }
    
    th { 
        background-color: #1a73e8; 
        color: white; 
    }
    
    tr:nth-child(even) { background-color: #f9f9f9; }
    
    .page-break-row { 
        background-color: #0d47a1 !important; 
        color: white; 
        font-weight: bold; 
        font-size: 12px; 
    }
    
    .bonus-row { 
        background-color: #e65100 !important; 
        color: white; 
        font-weight: bold; 
        font-size: 12px; 
    }
    
    .summary-header { background-color: #2e7d32; color: white; }
    .grand-total-row { background-color: #c8e6c9; font-weight: bold; font-size: 13px; color: #1b5e20; }
    
    .highlight { font-weight: bold; color: #1a73e8; background: #e8f0fe; }
    .accumulated { color: #2e7d32; font-weight: bold; background: #f1f8e9; }
    
    .result-card { 
        background: #ffffff; 
        padding: 15px; 
        border: 2px dashed #2e7d32; 
        border-radius: 8px; 
        margin-top: 20px; 
        text-align: center; 
        font-size: 18px; 
        font-weight: bold; 
        color: #1b5e20; 
    }
    
    .footer-msg { 
        margin-top: 30px; 
        padding: 15px; 
        background-color: #eeeeee; 
        border-radius: 8px; 
        text-align: center; 
        font-size: 14px; 
        color: #333; 
        border: 1px solid #ccc; 
    }
</style>

<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>पुणे महानगरपालिका रजा नोंद व कर्मचारी व्यवस्थापन प्रणाली</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        .container {
            max-width: 1350px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #1a73e8;
            border-bottom: 2px solid #1a73e8;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background-color: #e0e0e0;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab-btn.active {
            background-color: #1a73e8;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .setup-box,
        .entry-box,
        .encash-box,
        .info-box {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .setup-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
        }

        .entry-box {
            background: #fffde7;
            border: 1px solid #fbc02d;
        }

        .encash-box {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
        }

        .info-box {
            background: #fce4ec;
            border: 1px solid #f8bbd0;
        }

        label {
            font-weight: bold;
            font-size: 13px;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input:disabled,
        input[readonly] {
            background-color: #eee;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-add,
        .btn-excel,
        .btn-delete {
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add {
            background-color: #1a73e8;
        }

        .btn-excel {
            background-color: #2e7d32;
        }

        .btn-delete {
            background-color: #d32f2f;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 11px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }

        th {
            background-color: #1a73e8;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .highlight {
            font-weight: bold;
            color: #1a73e8;
            background: #e8f0fe;
        }

        .accumulated {
            color: #2e7d32;
            font-weight: bold;
            background: #f1f8e9;
        }

        .result-card {
            background: #ffffff;
            padding: 15px;
            border: 2px dashed #2e7d32;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1b5e20;
        }

        .footer-msg {
            margin-top: 30px;
            padding: 15px;
            background-color: #eeeeee;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ccc;
        }

        .footer-msg a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>पुणे महानगरपालिका रजा नोंद व सेवानिवृत्ती व्यवस्थापन प्रणाली</h2>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(event,'page1')">१. रजा नोंदणी पुस्तिका</button>

        <button class="tab-btn" onclick="switchTab(event,'page2')">२. निवृत्ती रजा वेतन</button>

        <button class="tab-btn" onclick="switchTab(event,'page3')">३. कर्मचारी माहिती</button>
    </div>

    <!-- PAGE 1 -->

    <div id="page1" class="tab-content active">

        <div class="setup-box">

            <div>
                <label>मागील रजा संपल्याचा दिनांक</label>
                <input type="date" id="p3_date" onchange="setFirstStartDate()">
            </div>

            <div>
                <label>सुरुवातीची शिल्लक EL</label>
                <input type="number" step="0.01" id="z3_bal">
            </div>

            <div>
                <label>सुरुवातीची शिल्लक ML</label>
                <input type="number" step="0.01" id="aa3_bal">
            </div>

        </div>

        <div class="entry-box">

            <div>
                <label>सुरवातीचा हजर दिनांक</label>
                <input type="date" id="a_start" readonly>
            </div>

            <div>
                <label>शेवटचा हजर दिनांक</label>
                <input type="date" id="b_end" onchange="updateLeaveStartDate()">
            </div>

            <div>
                <label>LWP</label>
                <input type="number" id="e_lwp" value="0">
            </div>

            <div>
                <label>रजेवर गेल्याचा दिनांक</label>
                <input type="date" id="o_leave_start" readonly>
            </div>

            <div>
                <label>रजा संपल्याचा दिनांक</label>
                <input type="date" id="p_leave_end">
            </div>

            <div>
                <label>रजेचा प्रकार</label>

                <select id="q_type">
                    <option value="हक्काची रजा">हक्काची रजा</option>
                    <option value="वैद्यकीय रजा">वैद्यकीय रजा</option>
                    <option value="विशेष रजा">विशेष रजा</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-add" onclick="addEntry()">Save Entry</button>

                <button class="btn-excel" onclick="downloadExcel()">Excel डाउनलोड</button>

                <button class="btn-delete" id="deleteBtn" onclick="deleteLastEntry()" style="display:none;">
                    Delete
                </button>
            </div>

        </div>

        <div class="table-wrapper">

            <table id="recordTable">

                <thead>

                <tr>
                    <th>हजर दिनांक</th>
                    <th>हजर दिवस</th>
                    <th>EL</th>
                    <th>ML</th>
                    <th>एकूण EL</th>
                    <th>एकूण ML</th>
                    <th>रजा दिनांक</th>
                    <th>प्रकार</th>
                    <th>रजा दिवस</th>
                    <th>अंतिम EL</th>
                    <th>अंतिम ML</th>
                </tr>

                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <!-- PAGE 2 -->

    <div id="page2" class="tab-content">

        <h3>Leave Encashment</h3>

        <div class="encash-box">

            <div>
                <label>Basic Pay</label>
                <input type="number" id="basic_pay" oninput="calculateEncashment()">
            </div>

            <div>
                <label>DA</label>
                <input type="number" id="da_amount" oninput="calculateEncashment()">
            </div>

            <div>
                <label>Total EL</label>
                <input type="number" id="total_el_shilak" oninput="calculateEncashment()">
            </div>

        </div>

        <div class="result-card" id="encashmentResult">
            माहिती भरा
        </div>

    </div>

    <!-- PAGE 3 -->

    <div id="page3" class="tab-content">

        <div class="info-box">

            <div>
                <label>कर्मचाऱ्याचे नाव</label>
                <input type="text" id="info_name">
            </div>

            <div>
                <label>पदनाम</label>
                <input type="text" id="info_desig">
            </div>

            <div>
                <label>विभाग</label>
                <input type="text" id="info_dept">
            </div>

            <div>
                <label>PF नंबर</label>
                <input type="text" id="info_pf">
            </div>

        </div>

    </div>

    <div class="footer-msg">
        सूचना / दुरुस्ती साठी WhatsApp करा :
        <a href="tel:9922987391">9922987391</a>
    </div>

</div>

<script>

    let history = [];
    let isFirstEntry = true;
    let initialValues = {};

    function formatDateDDMMYYYY(dateStr) {

        let d = new Date(dateStr);

        let day = String(d.getDate()).padStart(2, '0');

        let month = String(d.getMonth() + 1).padStart(2, '0');

        let year = d.getFullYear();

        return `${day}/${month}/${year}`;
    }

    function formatDateInput(date) {

        return date.getFullYear() + '-' +
            String(date.getMonth()+1).padStart(2,'0') + '-' +
            String(date.getDate()).padStart(2,'0');
    }

    function switchTab(event, tabId) {

        document.querySelectorAll('.tab-content')
            .forEach(el => el.classList.remove('active'));

        document.querySelectorAll('.tab-btn')
            .forEach(el => el.classList.remove('active'));

        document.getElementById(tabId)
            .classList.add('active');

        event.currentTarget.classList.add('active');

        if(tabId === 'page2' && history.length > 0){

            let lastRecord = history[history.length - 1];

            document.getElementById('total_el_shilak').value =
                Math.floor(lastRecord.finalEL);

            calculateEncashment();
        }
    }

    function setFirstStartDate() {

        if(isFirstEntry){

            let p3Val = document.getElementById('p3_date').value;

            if(p3Val){

                let p3 = new Date(p3Val);

                let nextA = new Date(p3);

                nextA.setDate(nextA.getDate() + 1);

                document.getElementById('a_start').value =
                    formatDateInput(nextA);
            }
        }
    }

    function updateLeaveStartDate() {

        let bVal = document.getElementById('b_end').value;

        if(bVal){

            let bDate = new Date(bVal);

            let oDate = new Date(bDate);

            oDate.setDate(oDate.getDate() + 1);

            document.getElementById('o_leave_start').value =
                formatDateInput(oDate);
        }
    }

    function applyLimits(val, maxLimit) {

        let integerPart = Math.floor(val);

        let decimalPart =
            Math.round((val % 1) * 100) / 100;

        return (integerPart >= maxLimit)
            ? maxLimit + decimalPart
            : val;
    }

    function addEntry() {

        let a = document.getElementById('a_start').value;

        let b = document.getElementById('b_end').value;

        let e = parseFloat(document.getElementById('e_lwp').value) || 0;

        let o = document.getElementById('o_leave_start').value;

        let p = document.getElementById('p_leave_end').value;

        let q = document.getElementById('q_type').value;

        if (!a || !b || !p) {

            alert("कृपया सर्व तारखा भरा!");
            return;
        }

        if(new Date(p) < new Date(o)){

            alert("रजा समाप्ती दिनांक चुकीचा आहे");
            return;
        }

        if (isFirstEntry) {

            initialValues = {

                el: parseFloat(document.getElementById('z3_bal').value) || 0,

                ml: parseFloat(document.getElementById('aa3_bal').value) || 0
            };

            isFirstEntry = false;
        }

        let curEL = history.length > 0
            ? history[history.length-1].finalEL
            : initialValues.el;

        let curML = history.length > 0
            ? history[history.length-1].finalML
            : initialValues.ml;

        let f =
            (Math.ceil(Math.abs(new Date(b) - new Date(a))
            / (1000 * 60 * 60 * 24)) + 1) - e;

        let g = Math.floor(f / 11) + (f % 11) / 100;

        let h = Math.floor(f / 30) + (f % 30) / 100;

        let k_val = curEL + g;

        let l_val = curML + h;

        let r_diff =
            Math.ceil(Math.abs(new Date(p) - new Date(o))
            / (1000 * 60 * 60 * 24)) + 1;

        let finalEL = k_val;
        let finalML = l_val;

        if(q === "हक्काची रजा"){

            finalEL = k_val - r_diff;

            if(finalEL < 0) finalEL = 0;
        }

        if(q === "वैद्यकीय रजा"){

            finalML = l_val - r_diff;

            if(finalML < 0) finalML = 0;
        }

        history.push({
            a,b,f,g,h,k_val,l_val,o,p,q,r_diff,finalEL,finalML
        });

        renderTable();

        let nextA = new Date(p);

        nextA.setDate(nextA.getDate() + 1);

        document.getElementById('a_start').value =
            formatDateInput(nextA);

        document.getElementById('b_end').value = "";

        document.getElementById('o_leave_start').value = "";

        document.getElementById('p_leave_end').value = "";

        document.getElementById('deleteBtn').style.display =
            "inline-block";
    }

    function renderTable() {

        let tbody = document.querySelector("#recordTable tbody");

        tbody.innerHTML = "";

        history.forEach(item => {

            let row = tbody.insertRow();

            row.innerHTML = `
                <td>${formatDateDDMMYYYY(item.a)} - ${formatDateDDMMYYYY(item.b)}</td>

                <td>${item.f}</td>

                <td>${item.g.toFixed(2)}</td>

                <td>${item.h.toFixed(2)}</td>

                <td class="accumulated">${item.k_val.toFixed(2)}</td>

                <td class="accumulated">${item.l_val.toFixed(2)}</td>

                <td>${formatDateDDMMYYYY(item.o)} - ${formatDateDDMMYYYY(item.p)}</td>

                <td>${item.q}</td>

                <td>${item.r_diff}</td>

                <td class="highlight">${item.finalEL.toFixed(2)}</td>

                <td class="highlight">${item.finalML.toFixed(2)}</td>
            `;
        });
    }

    function deleteLastEntry() {

        if(history.length === 0) return;

        if(confirm("शेवटची नोंद हटवायची आहे?")){

            history.pop();

            renderTable();

            if(history.length === 0){

                document.getElementById('deleteBtn').style.display =
                    "none";
            }
        }
    }

    function downloadExcel() {

        if(history.length === 0){

            alert("डेटा उपलब्ध नाही");
            return;
        }

        let csvContent = "\uFEFF";

        const headers = [
            "हजर दिनांक",
            "हजर दिवस",
            "EL",
            "ML",
            "एकूण EL",
            "एकूण ML",
            "रजा दिनांक",
            "प्रकार",
            "रजा दिवस",
            "अंतिम EL",
            "अंतिम ML"
        ];

        csvContent += headers.join(",") + "\n";

        history.forEach(item => {

            let row = [

                `"${formatDateDDMMYYYY(item.a)} - ${formatDateDDMMYYYY(item.b)}"`,

                item.f,

                item.g.toFixed(2),

                item.h.toFixed(2),

                item.k_val.toFixed(2),

                item.l_val.toFixed(2),

                `"${formatDateDDMMYYYY(item.o)} - ${formatDateDDMMYYYY(item.p)}"`,

                `"${item.q}"`,

                item.r_diff,

                item.finalEL.toFixed(2),

                item.finalML.toFixed(2)
            ];

            csvContent += row.join(",") + "\n";
        });

        const blob =
            new Blob([csvContent],
            { type: 'text/csv;charset=utf-8;' });

        const link = document.createElement("a");

        link.setAttribute("href", URL.createObjectURL(blob));

        link.setAttribute("download", "PMC_Raja_Nond.csv");

        link.click();
    }

    function calculateEncashment() {

        let basic =
            parseFloat(document.getElementById('basic_pay').value) || 0;

        let da =
            parseFloat(document.getElementById('da_amount').value) || 0;

        let elDays =
            parseFloat(document.getElementById('total_el_shilak').value) || 0;

        let validDays = elDays > 300 ? 300 : elDays;

        let oneDaySalary = (basic + da) / 30;

        let totalEncashment = oneDaySalary * validDays;

        let resultBox =
            document.getElementById('encashmentResult');

        resultBox.innerHTML =
            `एकूण रजा वेतन रक्कम : रु. ${totalEncashment.toFixed(2)}`;
    }

</script>

</body>
</html>
